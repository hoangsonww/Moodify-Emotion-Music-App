# =============================================================================
# Moodify backend (Django REST API) — production-grade Deployment
# =============================================================================
# Notes for operators:
#   * The container image must be a Django + Gunicorn image that listens
#     on 0.0.0.0:8000. The default `moodify-backend:latest` is built by
#     `backend/Dockerfile`.
#   * Real env values (API_URL, MODAL_INFERENCE_URL, MONGO_URI, JWT_SIGNING_KEY,
#     etc.) come from the ConfigMap + Secret in this directory — DON'T inline
#     them in the manifest.
#   * Liveness + readiness probes hit /health/live and /health/ready which
#     the Django app exposes via `users/health/`.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: moodify-backend
  labels:
    app.kubernetes.io/name: moodify-backend
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: moodify
spec:
  replicas: 3
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: moodify-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: moodify-backend
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: moodify
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 30
      containers:
        - name: backend
          image: ghcr.io/hoangsonww/moodify-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: moodify-config
            - secretRef:
                name: moodify-secrets
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /users/health/
              port: http
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /users/health/
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /users/health/
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /app/.cache
      volumes:
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir: {}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: moodify-backend
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: moodify-backend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: moodify-backend
  minReplicas: 3
  maxReplicas: 12
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: moodify-backend
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: moodify-backend
